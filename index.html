.meet-bg-2 { background: linear-gradient(160deg, #9fd8e4 0%, #4dbec8 40%, #1ca0a8 100%); }

.page-header {

}
.page-header .subtitle { font-size: 13px; opacity: .85; margin-bottom: 4px; }
.page-header h1 { font-size: 22px; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,.15); }
.page-header .season { font-size: 12px; opacity: .75; margin-top: 3px; }

.content-area {

}

.screen { display: none; max-width: 480px; margin: 0 auto; }
.screen.active { display: block; }

h2 { font-size: 18px; font-weight: 700; margin-bottom: .5rem; }
h3 { font-size: 16px; font-weight: 600; margin-bottom: .5rem; }

.card {

  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}

.btn {
  display: block; width: 100%;
  padding: 12px 16px;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text);
  font-size: 15px; font-weight: 500;
  cursor: pointer; margin-bottom: 10px;
  font-family: inherit; text-align: center;
  transition: background .15s;
}
.btn:active { transform: scale(0.98); }
.btn:hover { background: var(--bg2); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn-sm { width: auto; display: inline-block; padding: 7px 12px; font-size: 13px; margin-bottom: 0; }
.btn-back { margin-bottom: 1rem; width: auto; display: inline-block; padding: 7px 12px; font-size: 13px; }

.btn-ghost:hover { background: rgba(255,255,255,0.35); }

.meet-card {

  margin-bottom: .75rem;
  cursor: pointer;
  transition: background .15s, transform .1s;
  display: flex; align-items: center; justify-content: space-between;

.meet-card:hover { background: var(--bg2); }
.meet-card:active { transform: scale(0.99); }
.meet-card-left .meet-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; color: var(--text); }
.meet-card-left .meet-sub { font-size: 13px; color: var(--text2); }
.meet-card-arrow { color: var(--text3); font-size: 18px; }

.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.metric {

  border-radius: var(--radius-sm);

.section-label {

.tab {

  background: transparent; color: var(--text2);

.event-row {

.event-row:last-child { border-bottom: none; }
.ev-num { color: var(--text3); font-size: 12px; min-width: 32px; font-weight: 600; }

.badge { padding: 3px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 700; }
.badge-s { background: var(--green-bg); color: var(--green-txt); }
.badge-a { background: var(--red-bg); color: var(--red-txt); }

.input-field {

.error-msg { color: var(--red-txt); font-size: 13px; margin-top: 4px; display: none; }

.sync-bar {

.progress-bar-wrap { background: var(--bg3); border-radius: 99px; height: 5px; margin: 8px 0; }
.progress-bar-fill { background: var(--accent); border-radius: 99px; height: 5px; transition: width .4s; }

.spinner {
  display: inline-block; width: 13px; height: 13px;

@keyframes spin { to { transform: rotate(360deg); } }

.top-bar {

.firebase-warning {

</div>

// Helper: get EVENTS array for the current meet (merges defs + swimmers)
function getEvents() {
  const swimmers = currentMeet ? MEET_SWIMMERS[currentMeet.id] : null;
  return EVENT_DEFS.map((def, i) => ({
    ...def,
    heats: swimmers && swimmers[i] ? swimmers[i] : null
  }));
}

const SCORER_PW = "slsc2026";

// ── STATE ─────────────────────────────────────────────────────────────────────
let db = null, currentMeet = null, results = {}, adminEventIdx = 0;
let selections = {1:null,2:null,3:null};

// ── FIREBASE ──────────────────────────────────────────────────────────────────
function initFirebase() {
  if (FIREBASE_CONFIG.apiKey.startsWith("PASTE_")) {
    showWarning("firebase-warning", "⚠️ Firebase not configured — results won't sync. See setup instructions in the HTML.");
    showWarning("firebase-warning-hub", "⚠️ Firebase not configured — live sync disabled.");
    return;
  }
  try { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); }
  catch(e) { showWarning("firebase-warning", "⚠️ Firebase error: " + e.message); }
}
function showWarning(id, msg) { const el=document.getElementById(id); if(el){el.style.display='block';el.textContent=msg;} }
function dbRef() { return db && currentMeet ? db.ref('meets/'+currentMeet.id+'/results') : null; }

async function saveResults() {
  setSyncStatus('saving');
  const ref = dbRef();
  if (!ref) { setSyncStatus('no-db'); return; }
  try { await ref.set(results); setSyncStatus('saved'); }
  catch(e) { setSyncStatus('error'); }
}

async function loadResults() {
  const ref = dbRef(); if (!ref) return;
  try {
    const snap = await ref.get();
    const raw = snap.exists() ? snap.val() : {};
    const norm = {}; Object.keys(raw).forEach(k => norm[parseInt(k)] = raw[k]);
    results = norm;
  } catch(e) { results = {}; }
}

function subscribeResults(cb) {
  const ref = dbRef(); if (!ref) return;
  ref.on('value', snap => {
    const raw = snap.exists() ? snap.val() : {};
    const norm = {}; Object.keys(raw).forEach(k => norm[parseInt(k)] = raw[k]);
    results = norm; cb();
  });
}
function unsubscribeResults() { const ref=dbRef(); if(ref) ref.off(); }

function setSyncStatus(s) {
  const el = document.getElementById('sync-status'); if(!el) return;
  if(s==='saving') el.innerHTML='<span class="spinner"></span>Saving...';
  else if(s==='saved'){el.textContent='Saved ✓'; setTimeout(()=>el.textContent='',2000);}
  else if(s==='error') el.textContent='Save failed — check connection';
  else if(s==='no-db') el.textContent='Firebase not configured';
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function oppName() { return currentMeet ? currentMeet.opp : 'OPP'; }

function calcIndPoints(r) {
  const [s1,s2,s3]=[r[1],r[2],r[3]], op=oppName();
  if(s1==='SLSC'&&s2==='SLSC'&&s3==='SLSC') return{slsc:8,opp:1};
  if(s1===op&&s2===op&&s3===op) return{slsc:1,opp:8};
  let slsc=0,opp=0;
  if(s1==='SLSC')slsc+=5; else if(s1===op)opp+=5;
  if(s2==='SLSC')slsc+=3; else if(s2===op)opp+=3;
  if(s3==='SLSC')slsc+=1; else if(s3===op)opp+=1;
  return{slsc,opp};
}

function isSweep(r) {
  if(!r||!r[1]||!r[2]||!r[3]) return null;
  const op=oppName();
  if(r[1]==='SLSC'&&r[2]==='SLSC'&&r[3]==='SLSC') return 'SLSC';
  if(r[1]===op&&r[2]===op&&r[3]===op) return op;
  return null;
}

function calcScores() {
  const EVENTS=getEvents();
  let slsc=0,opp=0,lastDone=-1;
  EVENTS.forEach((ev,i)=>{
    const r=results[i]; if(!r) return;
    lastDone=i;
    if(ev.relay){ if(r[1]==='SLSC')slsc+=7; else if(r[1]===oppName())opp+=7; }
    else{ const p=calcIndPoints(r); slsc+=p.slsc; opp+=p.opp; }
  });
  return{slsc,opp,lastDone};
}

function calcMaxRemaining() {
  const EVENTS=getEvents();
  let max=0; EVENTS.forEach((ev,i)=>{ if(!results[i]) max+=ev.relay?7:9; }); return max;
}

function getStatus(slsc,opp,maxRemaining) {
  const diff=slsc-opp, evsDone=Object.keys(results).length, on=oppName();
  if(evsDone===0) return{text:'Meet not started',sub:'No events recorded yet',bg:'var(--bg2)',tc:'var(--text)'};
  if(maxRemaining===0){
    if(diff>0) return{text:'Stony Lane wins! 🏆',sub:`Final: SLSC ${slsc} – ${on} ${opp}`,bg:'#c0dd97',tc:'#1a5c2a'};
    if(diff<0) return{text:'Winning hearts and minds',sub:`Final: SLSC ${slsc} – ${on} ${opp}`,bg:'#fde8e8',tc:'#7a1f1f'};
    return{text:"It's a tie!",sub:`Final: SLSC ${slsc} – ${on} ${opp}`,bg:'#fef3d0',tc:'#7a4f00'};
  }
  if(diff>0){
    if(diff>maxRemaining) return{text:'Definitely winning 🏊',sub:`Up by ${diff} pts — can't be caught`,bg:'#c0dd97',tc:'#1a5c2a'};
    if(diff>maxRemaining*0.4) return{text:'Probably winning 💪',sub:`Up by ${diff} pts, ${maxRemaining} pts remain`,bg:'#d4edda',tc:'#1a5c2a'};
    return{text:'Unclear who is winning',sub:`Up by ${diff} pts — anyone's meet`,bg:'#fef3d0',tc:'#7a4f00'};
  }
  const behind=Math.abs(diff);
  if(behind>maxRemaining) return{text:'Winning hearts and minds 💙',sub:`Down by ${behind} pts — can't catch up`,bg:'#fde8e8',tc:'#7a1f1f'};
  return{text:'Unclear who is winning',sub:`Down by ${behind} pts — still anyone's meet`,bg:'#fef3d0',tc:'#7a4f00'};
}

// ── SWIMMER DISPLAY ───────────────────────────────────────────────────────────
function renderSwimmerDisplay(lastDone) {
  const EVENTS = getEvents();
  const container = document.getElementById('swimmer-display');
  const evsDone = Object.keys(results).length;
  const nextIdx = lastDone + 1;

  const slots = [];
  if (evsDone === 0) {
    for(let i=0;i<Math.min(3,EVENTS.length);i++) slots.push({ev:EVENTS[i], role: i===0?'current':'ondeck'+(i)});
  } else {
    slots.push({ev: EVENTS[lastDone], role:'current'});
    if(nextIdx < EVENTS.length) slots.push({ev: EVENTS[nextIdx], role:'ondeck1'});
    if(nextIdx+1 < EVENTS.length) slots.push({ev: EVENTS[nextIdx+1], role:'ondeck2'});
  }

  let html = '';
  slots.forEach(slot => {
    const ev = slot.ev;
    const isCurrent = slot.role === 'current';
    const isOndeck1 = slot.role === 'ondeck1';
    let headerClass = 'event-display-header';
    if(isOndeck1) headerClass += ' ondeck';
    else if(slot.role==='ondeck2') headerClass += ' ondeck2';

    let tag = '';
    if(evsDone===0 && slot.role==='current') tag = 'Up first';
    else if(isCurrent) tag = 'In the water';
    else if(isOndeck1) tag = 'On deck';
    else tag = 'On deck 2';

    html += `<div class="event-display-card">
      <div class="${headerClass}">
        <span class="ev-tag">${tag} · #${ev.n}</span>
        <span class="ev-name">${ev.name}</span>
      </div>`;

    if (ev.heats) {
      ev.heats.forEach(heat => {
        html += `<div class="heat-block">
          <div class="heat-label">${heat.label}</div>
          <div class="swimmer-list">`;
        heat.swimmers.forEach(s => { html += `<span class="swimmer-chip">${s}</span>`; });
        html += `</div></div>`;
      });
    } else {
      html += `<div class="heat-block"><div style="font-size:13px;color:var(--text3);font-style:italic">Lineup TBD — check back the day before the meet</div></div>`;
    }
    html += `</div>`;
  });

  container.innerHTML = html;
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setHeaderBg(bgClass, title, sub) {
  const h = document.getElementById('page-header');
  h.className = 'page-header ' + bgClass;
  document.getElementById('header-title').textContent = title;
  document.getElementById('header-sub').textContent = sub;
}

function buildMeetList() {
  const list = document.getElementById('meet-list');
  MEETS.forEach(meet => {
    const hasSw = !!MEET_SWIMMERS[meet.id];
    const div = document.createElement('div');
    div.className = 'meet-card';
    div.innerHTML = `<div class="meet-card-left"><div class="meet-title">${meet.label}</div><div class="meet-sub">${meet.date}${!hasSw ? ' · <em>lineup TBD</em>' : ''}</div></div><div class="meet-card-arrow">›</div>`;
    div.onclick = () => openMeet(meet);
    list.appendChild(div);
  });
}

async function openMeet(meet) {
  currentMeet = meet;
  document.getElementById('hub-opp-label').textContent = meet.opp;
  document.getElementById('admin-meet-name').textContent = meet.date;
  setHeaderBg(meet.bgClass, 'Meet Status', meet.label + ' · ' + meet.date);
  await loadResults();
  renderHub();
  subscribeResults(renderHub);
  show('screen-hub');
}

function leaveHub() {
  unsubscribeResults();
  setHeaderBg('meet-bg-0', 'Unofficial Meet Tracker', '2026 Season');
  show('screen-home');
}

function goAdmin() {
  show('screen-login');
  document.getElementById('pw-input').value='';
  document.getElementById('pw-error').style.display='none';
}

function checkPw() {
  if(document.getElementById('pw-input').value===SCORER_PW){show('screen-admin');loadAdminState();}
  else document.getElementById('pw-error').style.display='block';
}

// ── HUB RENDER ────────────────────────────────────────────────────────────────
function renderHub() {
  const EVENTS = getEvents();
  const{slsc,opp,lastDone}=calcScores();
  const maxRemaining=calcMaxRemaining();
  const st=getStatus(slsc,opp,maxRemaining);
  document.getElementById('hub-slsc').textContent=slsc;
  document.getElementById('hub-opp').textContent=opp;
  const banner=document.getElementById('hub-status-banner');
  banner.style.background=st.bg;
  banner.innerHTML=`<div class="status-text" style="color:${st.tc}">${st.text}</div><div class="status-sub" style="color:${st.tc}">${st.sub}</div>`;
  renderSwimmerDisplay(lastDone);
  renderResultsPanel(lastDone);
  renderUpcomingPanel(lastDone+1);
}

function renderResultsPanel(lastDone) {
  const EVENTS = getEvents();
  const p=document.getElementById('panel-results');
  if(lastDone<0){p.innerHTML='<div style="color:var(--text2);font-size:14px;padding:8px 0">No results yet.</div>';return;}
  let html='';
  for(let i=Math.max(0,lastDone-9);i<=lastDone;i++){
    const ev=EVENTS[i],r=results[i]; if(!r) continue;
    let slscPts=0;
    if(ev.relay){slscPts=r[1]==='SLSC'?7:0;}
    else{slscPts=calcIndPoints(r).slsc;}
    const sw=!ev.relay?isSweep(r):null;
    const winner=r[1];
    const badgeClass=winner==='SLSC'?'badge-s':winner===oppName()?'badge-a':'';
    const sweepTag=sw?`<span style="font-size:10px;color:var(--warn-txt);margin-left:4px">sweep</span>`:'';
    html+=`<div class="event-row"><span class="ev-num">#${ev.n}</span><span style="flex:1;font-size:13px;padding:0 6px">${ev.name}</span>${sweepTag}${badgeClass?`<span class="badge ${badgeClass}" style="margin-left:4px">${winner}</span>`:''}<span style="font-size:11px;color:var(--text3);margin-left:6px;min-width:28px;text-align:right">+${slscPts}</span></div>`;
  }
  p.innerHTML=html||'<div style="color:var(--text2);font-size:14px">No results.</div>';
}

function renderUpcomingPanel(nextIdx) {
  const EVENTS = getEvents();
  const p=document.getElementById('panel-upcoming');
  if(nextIdx>=EVENTS.length){p.innerHTML='<div style="color:var(--text2);font-size:14px;padding:8px 0">All events complete.</div>';return;}
  let html='';
  for(let i=nextIdx;i<Math.min(nextIdx+12,EVENTS.length);i++){
    const ev=EVENTS[i];
    html+=`<div class="event-row"><span class="ev-num">#${ev.n}</span><span style="flex:1;font-size:13px;padding:0 6px">${ev.name}</span><span style="font-size:11px;color:var(--text3)">${ev.relay?'Relay':'Ind.'}</span></div>`;
  }
  p.innerHTML=html;
}

function switchTab(tab){
  document.getElementById('panel-results').style.display=tab==='results'?'block':'none';
  document.getElementById('panel-upcoming').style.display=tab==='upcoming'?'block':'none';
  document.getElementById('tab-results').classList.toggle('active',tab==='results');
  document.getElementById('tab-upcoming').classList.toggle('active',tab==='upcoming');
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function loadAdminState(){
  const EVENTS = getEvents();
  adminEventIdx=0;
  for(let i=0;i<EVENTS.length;i++){
    if(!results[i]){adminEventIdx=i;break;}
    if(i===EVENTS.length-1)adminEventIdx=EVENTS.length-1;
  }
  renderAdminEvent();
}

function renderAdminEvent(){
  const EVENTS = getEvents();
  const ev=EVENTS[adminEventIdx];
  document.getElementById('admin-event-label').textContent=`Event ${ev.n} of ${EVENTS.length}`;
  document.getElementById('admin-event-name').textContent=ev.name;
  const rn=document.getElementById('admin-relay-note');
  rn.style.display=ev.relay?'block':'none';
  if(ev.relay) rn.textContent='Relay: 1st place = 7 pts only';
  const evsDone=Object.keys(results).length;
  document.getElementById('admin-progress').textContent=`${evsDone} of ${EVENTS.length} events entered`;
  document.getElementById('admin-progress-fill').style.width=Math.round((evsDone/EVENTS.length)*100)+'%';
  const saved=results[adminEventIdx]||{};
  selections={1:saved[1]||null,2:saved[2]||null,3:saved[3]||null};
  renderPlaceSections();
}

function renderPlaceSections(){
  const EVENTS = getEvents();
  const ev=EVENTS[adminEventIdx];
  const places=ev.relay?[1]:[1,2,3];
  const labels={1:'1st place',2:'2nd place',3:'3rd place'};
  let html='';
  places.forEach(p=>{ html+=`<div class="section-label">${labels[p]}</div><div class="place-grid" id="grid-place-${p}"></div>`; });
  document.getElementById('place-sections').innerHTML=html;
  places.forEach(place=>{
    const grid=document.getElementById(`grid-place-${place}`);
    ['SLSC',oppName()].forEach(team=>{
      const b=document.createElement('button');
      b.className='place-btn';
      b.textContent=team;
      if(selections[place]===team) b.classList.add(team==='SLSC'?'sel-slsc':'sel-opp');
      b.onclick=()=>{selections[place]=team;renderPlaceSections();};
      grid.appendChild(b);
    });
  });
  const sn=document.getElementById('sweep-note');
  if(!ev.relay){
    const sw=isSweep(selections);
    if(sw){sn.style.display='block';sn.textContent=`Sweep! ${sw} wins 1st & 2nd (8 pts), other team gets 1 consolation pt.`;}
    else sn.style.display='none';
  } else sn.style.display='none';
}

function submitResult(){
  const EVENTS = getEvents();
  const ev=EVENTS[adminEventIdx];
  const places=ev.relay?[1]:[1,2,3];
  for(const p of places){ if(!selections[p]){alert('Please select a result for all places.');return;} }
  const toSave={}; places.forEach(p=>toSave[p]=selections[p]);
  results[adminEventIdx]=toSave;
  saveResults().then(()=>{
    if(adminEventIdx<EVENTS.length-1){adminEventIdx++;renderAdminEvent();}
    else alert('All events entered!');
  });
}

function skipEvent(){const EVENTS=getEvents();if(adminEventIdx<EVENTS.length-1){adminEventIdx++;renderAdminEvent();}}
function prevEvent(){if(adminEventIdx>0){adminEventIdx--;renderAdminEvent();}}

initFirebase();
buildMeetList();
